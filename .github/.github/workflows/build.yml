name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [debug, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore (release only)
        if: matrix.variant == 'release' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/signing
          echo "$KEYSTORE_BASE64" | base64 -d > app/signing/keystore.jks

      - name: Build with Gradle
        run: ./gradlew assemble${VAR_CAP} --stacktrace
        env:
          VAR_CAP: ${{ matrix.variant == 'debug' && 'Debug' || 'Release' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.variant }}
          path: app/build/outputs/apk/${{ matrix.variant }}/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keystore
        if: always() && matrix.variant == 'release'
        run: rm -rf app/signing
